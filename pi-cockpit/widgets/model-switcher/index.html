<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Model Switcher — PI Cockpit</title>
  <link rel="stylesheet" href="../shared/styles.css">
  <style>
    .model-group {
      margin-bottom: 4px;
    }
    .model-group-header {
      padding: 6px 10px 2px;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
    }
    .model-item {
      padding: 6px 10px;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: background 0.1s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .model-item:hover {
      background: var(--bg-hover);
    }
    .model-item.active {
      background: var(--bg-active);
      border-left-color: var(--accent);
    }
    .model-item.active .model-name {
      color: var(--accent);
    }
    .model-icon {
      font-size: 14px;
      flex-shrink: 0;
    }
    .model-info {
      flex: 1;
      min-width: 0;
    }
    .model-name {
      font-size: 11px;
      font-weight: 500;
      font-family: var(--font-mono);
    }
    .model-provider {
      font-size: 9px;
      color: var(--text-muted);
    }
    .thinking-control {
      padding: 8px 10px;
      border-top: 1px solid var(--border-color);
    }
    .thinking-label {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .thinking-options {
      display: flex;
      gap: 4px;
    }
    .thinking-option {
      flex: 1;
      padding: 3px 0;
      text-align: center;
      font-size: 10px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s, color 0.1s;
      color: var(--text-muted);
    }
    .thinking-option:hover {
      background: var(--bg-hover);
    }
    .thinking-option.active {
      background: rgba(137, 180, 250, 0.15);
      border-color: var(--accent);
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="widget-container">
    <div class="connection-bar" id="connectionBar">
      <span class="status-dot disconnected" id="statusDot"></span>
      <span id="connectionText">Connecting...</span>
    </div>
    <div class="widget-header">
      <span class="widget-title">Model</span>
    </div>

    <!-- Model list -->
    <div class="widget-body" id="modelList">
      <div class="empty-state">
        <div class="empty-state-icon">📡</div>
        <div>Connecting...</div>
      </div>
    </div>

    <!-- Thinking level -->
    <div class="thinking-control">
      <div class="thinking-label">Thinking Level</div>
      <div class="thinking-options" id="thinkingOptions">
        <div class="thinking-option" data-level="off" onclick="setThinking('off')">Off</div>
        <div class="thinking-option" data-level="low" onclick="setThinking('low')">Low</div>
        <div class="thinking-option active" data-level="high" onclick="setThinking('high')">High</div>
        <div class="thinking-option" data-level="xhigh" onclick="setThinking('xhigh')">X-High</div>
      </div>
    </div>
  </div>

  <script type="module">
    import { connect } from "../shared/ws-client.js";

    const hub = connect("model-switcher");

    // Available models (can be extended via API later)
    const MODELS = [
      { id: "deepseek-v4-pro", name: "DeepSeek V4 Pro", provider: "DeepSeek", icon: "🧠" },
      { id: "claude-sonnet-4", name: "Claude Sonnet 4", provider: "Anthropic", icon: "🎭" },
      { id: "claude-opus-4", name: "Claude Opus 4", provider: "Anthropic", icon: "👑" },
      { id: "gpt-5", name: "GPT-5", provider: "OpenAI", icon: "🤖" },
      { id: "gemini-2.5-pro", name: "Gemini 2.5 Pro", provider: "Google", icon: "💎" },
    ];

    let currentModel = "deepseek-v4-pro";
    let currentThinkingLevel = "high";

    // ── Connection ──────────────────────────────────
    hub.on("connected", () => {
      document.getElementById("statusDot").className = "status-dot connected";
      document.getElementById("connectionText").textContent = "Connected";
    });

    hub.on("disconnected", () => {
      document.getElementById("statusDot").className = "status-dot disconnected";
      document.getElementById("connectionText").textContent = "Reconnecting...";
    });

    // ── State sync ─────────────────────────────────
    hub.on("state-sync", (data) => {
      currentModel = data.currentModel || currentModel;
      currentThinkingLevel = data.currentThinkingLevel || currentThinkingLevel;
      render();
    });

    hub.on("model-changed", (data) => {
      currentModel = data.model || currentModel;
      currentThinkingLevel = data.thinkingLevel || currentThinkingLevel;
      render();
    });

    // ── Render ─────────────────────────────────────
    function render() {
      const list = document.getElementById("modelList");
      list.innerHTML = MODELS.map(m => `
        <div class="model-item ${m.id === currentModel ? 'active' : ''}"
             onclick="switchModel('${m.id}')">
          <span class="model-icon">${m.icon}</span>
          <div class="model-info">
            <div class="model-name">${m.name}</div>
            <div class="model-provider">${m.provider}</div>
          </div>
          ${m.id === currentModel ? '<span class="status-dot active"></span>' : ''}
        </div>
      `).join("");

      // Update thinking options
      document.querySelectorAll(".thinking-option").forEach(el => {
        el.classList.toggle("active", el.dataset.level === currentThinkingLevel);
      });
    }

    // ── Actions ─────────────────────────────────────
    window.switchModel = (modelId) => {
      hub.send({ type: "switch-model", model: modelId });
    };

    window.setThinking = (level) => {
      hub.send({ type: "switch-model", model: currentModel, thinkingLevel: level });
    };

    // Initial render
    render();
  </script>
</body>
</html>
