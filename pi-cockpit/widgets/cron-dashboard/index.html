<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cron Dashboard — PI Cockpit</title>
  <link rel="stylesheet" href="../shared/styles.css">
  <style>
    .heartbeat-summary {
      padding: 6px 10px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      flex-shrink: 0;
    }
    .heartbeat-summary .hb-status {
      font-weight: 600;
    }
    .heartbeat-summary .hb-detail {
      font-size: 10px;
      color: var(--text-muted);
    }
    .hb-badge {
      font-size: 9px;
      padding: 0 5px;
      border-radius: 8px;
      font-weight: 600;
    }
    .hb-badge.crit { background: rgba(243,139,168,0.2); color: var(--danger); }
    .hb-badge.warn { background: rgba(249,226,175,0.2); color: var(--warning); }
    .hb-badge.ok { background: rgba(166,227,161,0.2); color: var(--success); }

    .daemon-item {
      display: flex;
      align-items: center;
      padding: 6px 10px;
      gap: 8px;
      border-bottom: 1px solid var(--border-color);
      transition: background 0.1s;
    }
    .daemon-item:hover { background: var(--bg-hover); }
    .daemon-item .daemon-status {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .daemon-item .daemon-status.running { background: var(--success); }
    .daemon-item .daemon-status.down { background: var(--danger); }
    .daemon-item .daemon-status.stale { background: var(--warning); }

    .daemon-info { flex: 1; min-width: 0; }
    .daemon-name {
      font-size: 12px;
      font-weight: 500;
      font-family: var(--font-mono);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .daemon-meta {
      font-size: 10px;
      color: var(--text-muted);
      display: flex;
      gap: 8px;
    }
    .daemon-actions {
      display: flex;
      gap: 3px;
      flex-shrink: 0;
    }
    .daemon-actions .btn {
      font-size: 9px;
      padding: 1px 6px;
    }

    .log-viewer {
      display: none;
      margin: 0 10px 6px;
      padding: 6px 8px;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      font-family: var(--font-mono);
      font-size: 9px;
      line-height: 1.3;
      color: var(--text-secondary);
      max-height: 200px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-viewer.open { display: block; }

    .actions-row {
      display: flex;
      gap: 4px;
      padding: 4px 8px;
      flex-shrink: 0;
      border-top: 1px solid var(--border-color);
    }

    .error-count {
      font-size: 9px;
      padding: 0 4px;
      border-radius: 6px;
      background: rgba(243,139,168,0.15);
      color: var(--danger);
    }
  </style>
</head>
<body>
  <div class="widget-container">
    <div class="connection-bar" id="connectionBar">
      <span class="status-dot disconnected" id="statusDot"></span>
      <span id="connectionText">Connecting...</span>
    </div>

    <div class="widget-header">
      <span class="widget-title">Crons</span>
      <span class="badge" id="daemonCount">0/6</span>
    </div>

    <!-- Heartbeat summary -->
    <div class="heartbeat-summary" id="heartbeatSummary">
      <span id="hbIcon">⬜</span>
      <span class="hb-status" id="hbStatus">Loading...</span>
      <span class="hb-detail" id="hbDetail"></span>
    </div>

    <!-- Daemon list -->
    <div class="widget-body" id="daemonList">
      <div class="empty-state">
        <div class="empty-state-icon">📡</div>
        <div>Waiting for hub...</div>
      </div>
    </div>

    <!-- Actions -->
    <div class="actions-row">
      <button class="btn btn-sm" onclick="refreshAll()">🔄 Refresh</button>
      <button class="btn btn-sm" onclick="refreshAll()">📋 Rescan</button>
    </div>
  </div>

  <script type="module">
    import { connect } from "../shared/ws-client.js";

    const hub = connect("cron-dashboard");
    let daemons = [];
    let heartbeat = null;
    let openLog = null;

    // ── Connection ──────────────────────────────────
    hub.on("connected", () => {
      document.getElementById("statusDot").className = "status-dot connected";
      document.getElementById("connectionText").textContent = "Connected";
      hub.send({ type: "refresh-daemons" });
    });

    hub.on("disconnected", () => {
      document.getElementById("statusDot").className = "status-dot disconnected";
      document.getElementById("connectionText").textContent = "Reconnecting...";
    });

    // ── Data ────────────────────────────────────────
    hub.on("daemons-updated", (data) => {
      daemons = data.daemons || [];
      heartbeat = data.heartbeat || null;

      if (heartbeat) {
        state._lastHeartbeatUpdate = Date.now();
      }

      render();
    });

    hub.on("daemon-restarted", (data) => {
      showToast(data.success
        ? `✅ ${data.label} restarted`
        : `❌ ${data.label} failed: ${data.message}`);
      if (data.success) {
        setTimeout(() => hub.send({ type: "refresh-daemons" }), 2000);
      }
    });

    hub.on("daemon-log", (data) => {
      if (data.success) {
        showLog(data.label, data.content);
      } else {
        showToast(`❌ ${data.content}`);
      }
    });

    // ── Render ─────────────────────────────────────
    function render() {
      renderHeartbeat();
      renderDaemonList();
    }

    function renderHeartbeat() {
      const hbIcon = document.getElementById("hbIcon");
      const hbStatus = document.getElementById("hbStatus");
      const hbDetail = document.getElementById("hbDetail");

      if (!heartbeat) {
        hbIcon.textContent = "⬜";
        hbStatus.textContent = "No heartbeat data";
        hbDetail.textContent = "";
        return;
      }

      const s = heartbeat.overallStatus || "";
      if (s.includes("🟢")) hbIcon.textContent = "🟢";
      else if (s.includes("🔴")) hbIcon.textContent = "🔴";
      else hbIcon.textContent = "🟡";

      hbStatus.textContent = s || "Unknown";

      const age = heartbeat.lastScan ? timeAgoStr(heartbeat.lastScan) : "?";
      const parts = [`Scanned: ${age}`];
      if (heartbeat.criticalCount > 0) {
        parts.push(`<span class="hb-badge crit">${heartbeat.criticalCount} crit</span>`);
      }
      if (heartbeat.warningCount > 0) {
        parts.push(`<span class="hb-badge warn">${heartbeat.warningCount} warn</span>`);
      }
      if (heartbeat.criticalCount === 0 && heartbeat.warningCount === 0) {
        parts.push(`<span class="hb-badge ok">all clear</span>`);
      }
      hbDetail.innerHTML = parts.join(" · ");
    }

    function renderDaemonList() {
      const list = document.getElementById("daemonList");
      const running = daemons.filter(d => d.running).length;
      document.getElementById("daemonCount").textContent = `${running}/${daemons.length}`;

      if (daemons.length === 0) {
        list.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🧹</div><div>No daemons found</div></div>`;
        return;
      }

      list.innerHTML = daemons.map(d => {
        let statusClass = "down";
        if (d.running) {
          statusClass = (d.errorCount > 0) ? "stale" : "running";
        }

        const meta = [];
        if (d.pid) meta.push(`PID ${d.pid}`);
        if (d.lastLogEntry) meta.push(logAge(d.lastLogEntry));
        if (d.errorCount > 0) meta.push(`<span class="error-count">${d.errorCount} err</span>`);

        return `
          <div class="daemon-item">
            <span class="daemon-status ${statusClass}"></span>
            <div class="daemon-info">
              <div class="daemon-name">${d.name}</div>
              <div class="daemon-meta">${meta.join(" · ")}</div>
            </div>
            <div class="daemon-actions">
              <button class="btn btn-sm" onclick="restartDaemon('${d.label}')" title="Restart">↻</button>
              <button class="btn btn-sm" onclick="viewLog('${d.label}')" title="View log">📄</button>
            </div>
          </div>
          <div class="log-viewer" id="log-${d.label}"></div>
        `;
      }).join("");
    }

    // ── Helpers ─────────────────────────────────────
    function logAge(iso) {
      if (!iso) return "never";
      const diff = Date.now() - new Date(iso).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return "just now";
      if (mins < 60) return `${mins}m ago`;
      const hours = Math.floor(mins / 60);
      if (hours < 24) return `${hours}h ago`;
      return `${Math.floor(hours / 24)}d ago`;
    }

    function timeAgoStr(str) {
      if (!str) return "?";
      try {
        const d = new Date(str);
        return logAge(d.toISOString());
      } catch {
        return str;
      }
    }

    // ── Actions ─────────────────────────────────────
    window.restartDaemon = (label) => {
      showToast(`Restarting ${label.replace("com.thoth.", "")}...`);
      hub.send({ type: "restart-daemon", label });
    };

    window.viewLog = (label) => {
      const logEl = document.getElementById(`log-${label}`);
      if (logEl.classList.contains("open")) {
        logEl.classList.remove("open");
        logEl.textContent = "";
        return;
      }

      // Close any other open logs
      document.querySelectorAll(".log-viewer.open").forEach(el => {
        el.classList.remove("open");
        el.textContent = "";
      });

      logEl.classList.add("open");
      logEl.textContent = "Loading...";
      hub.send({ type: "view-daemon-log", label, lines: 50 });
    };

    window.refreshAll = () => {
      hub.send({ type: "refresh-daemons" });
      showToast("Refreshing...");
    };

    function showLog(label, content) {
      const logEl = document.getElementById(`log-${label}`);
      if (logEl) {
        logEl.textContent = content || "(empty)";
      }
    }

    function showToast(msg) {
      const toast = document.createElement("div");
      toast.className = "toast";
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2500);
    }
  </script>
</body>
</html>
