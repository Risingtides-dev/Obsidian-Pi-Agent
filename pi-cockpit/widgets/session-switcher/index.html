<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Session Switcher — PI Cockpit</title>
  <link rel="stylesheet" href="../shared/styles.css">
  <style>
    .session-item .list-item-label {
      font-family: var(--font-mono);
      font-size: 11px;
    }
    .session-item .project-path {
      font-family: var(--font-mono);
      font-size: 9px;
    }
    .session-item .last-activity {
      font-size: 9px;
      color: var(--text-muted);
    }
    .session-item.active {
      background: var(--bg-active);
    }
    .session-item.active .list-item-label {
      color: var(--accent);
    }
    .model-chip {
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 8px;
      background: var(--bg-hover);
      color: var(--text-muted);
      font-family: var(--font-mono);
    }
    .actions-row {
      display: flex;
      gap: 4px;
      padding: 4px 8px;
      flex-shrink: 0;
      border-top: 1px solid var(--border-color);
    }
  </style>
</head>
<body>
  <div class="widget-container">
    <div class="connection-bar" id="connectionBar">
      <span class="status-dot disconnected" id="statusDot"></span>
      <span id="connectionText">Connecting...</span>
    </div>
    <div class="widget-header">
      <span class="widget-title">PI Sessions</span>
      <span class="badge" id="sessionCount">0</span>
    </div>
    <div class="widget-body" id="sessionList">
      <div class="empty-state">
        <div class="empty-state-icon">📡</div>
        <div>Waiting for hub...</div>
      </div>
    </div>
    <div class="actions-row">
      <button class="btn btn-sm" onclick="openNewTerminal()" title="Open terminal in session dir">▶ Terminal</button>
      <button class="btn btn-sm" onclick="openInFinder()" title="Open session dir in Finder">📂 Finder</button>
    </div>
  </div>

  <script type="module">
    import { connect } from "../shared/ws-client.js";

    const hub = connect("session-switcher");
    let sessions = [];
    let currentSession = null;

    // ── Connection status ──────────────────────────
    hub.on("connected", () => {
      document.getElementById("statusDot").className = "status-dot connected";
      document.getElementById("connectionText").textContent = "Connected";
    });

    hub.on("disconnected", () => {
      document.getElementById("statusDot").className = "status-dot disconnected";
      document.getElementById("connectionText").textContent = "Reconnecting...";
    });

    // ── State sync ─────────────────────────────────
    hub.on("state-sync", (data) => {
      sessions = data.sessions || [];
      currentSession = data.currentSession;
      renderSessions();
    });

    // ── Session changed ────────────────────────────
    hub.on("session-changed", (data) => {
      currentSession = data.session;
      sessions = data.sessions || sessions;
      renderSessions();
    });

    // ── Sessions updated (file watcher) ────────────
    hub.on("sessions-updated", (data) => {
      sessions = data.sessions || [];
      if (data.sessions) {
        // Preserve current session if still valid
        const stillExists = data.sessions.find(s => s.name === currentSession);
        if (!stillExists) {
          currentSession = data.sessions[0]?.name || null;
        } else {
          // Update current session's active flag
          data.sessions.forEach(s => { s.active = s.name === currentSession; });
        }
      }
      renderSessions();
    });

    // ── Render ─────────────────────────────────────
    function renderSessions() {
      const list = document.getElementById("sessionList");
      document.getElementById("sessionCount").textContent = sessions.length;

      if (sessions.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🧹</div>
            <div>No active PI sessions</div>
          </div>`;
        return;
      }

      list.innerHTML = sessions.map(s => `
        <div class="list-item session-item ${s.active ? 'active' : ''}"
             onclick="switchSession('${s.name}')"
             title="${s.projectPath || s.name}">
          <span class="list-item-icon">${s.isWorktree ? '🌿' : '📁'}</span>
          <div class="list-item-content">
            <div class="list-item-label">${s.shortName || s.name}</div>
            <div class="project-path">${s.projectPath || ''}</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;">
            <span class="model-chip">${s.model || '?'}</span>
            <span class="last-activity">${timeAgo(s.lastActivity)}</span>
          </div>
        </div>
      `).join("");
    }

    function timeAgo(iso) {
      if (!iso) return "";
      const diff = Date.now() - new Date(iso).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return "now";
      if (mins < 60) return `${mins}m`;
      const hours = Math.floor(mins / 60);
      if (hours < 24) return `${hours}h`;
      return `${Math.floor(hours / 24)}d`;
    }

    // ── Actions ─────────────────────────────────────
    window.switchSession = (name) => {
      hub.send({ type: "switch-session", session: name });
    };

    window.openNewTerminal = () => {
      if (!currentSession) return;
      // Build the actual path from the session name
      const session = sessions.find(s => s.name === currentSession);
      if (!session) return;

      let cwd = session.projectPath;
      if (session.isWorktree) {
        // Extract worktree path — complex, simplify for now
        cwd = session.name.replace(/^--|--$/g, "")
          .replace(/^Users-/, "/Users/")
          .replace(/-/g, "/")
          .replace("/.worktrees/", "/");
      }

      // Try to open via Obsidian's shell command or fallback
      hub.send({
        type: "chat-message",
        message: `/open-terminal ${cwd}`,
      });

      showToast(`Opening terminal at ${session.shortName}...`);
    };

    window.openInFinder = () => {
      if (!currentSession) return;
      hub.send({
        type: "chat-message",
        message: `/reveal-session ${currentSession}`,
      });
      showToast("Opening in Finder...");
    };

    function showToast(msg) {
      const toast = document.createElement("div");
      toast.className = "toast";
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2500);
    }
  </script>
</body>
</html>
