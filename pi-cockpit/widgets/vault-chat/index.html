<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vault Chat — PI Cockpit</title>
  <link rel="stylesheet" href="../shared/styles.css">
  <style>
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .chat-message {
      padding: 6px 10px;
      border-radius: var(--radius);
      font-size: 12px;
      line-height: 1.5;
      max-width: 90%;
      word-wrap: break-word;
    }
    .chat-message.user {
      align-self: flex-end;
      background: var(--accent);
      color: var(--bg-primary);
    }
    .chat-message.assistant {
      align-self: flex-start;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
    }
    .chat-message.system {
      align-self: center;
      background: transparent;
      color: var(--text-muted);
      font-size: 10px;
      font-style: italic;
      max-width: 100%;
      text-align: center;
    }
    .chat-input-area {
      display: flex;
      gap: 4px;
      padding: 6px 8px;
      border-top: 1px solid var(--border-color);
      background: var(--bg-secondary);
      flex-shrink: 0;
    }
    .chat-input-area textarea {
      flex: 1;
      resize: none;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      padding: 6px 8px;
      font-size: 12px;
      font-family: var(--font-sans);
      background: var(--bg-primary);
      color: var(--text-primary);
      outline: none;
      min-height: 28px;
      max-height: 120px;
    }
    .chat-input-area textarea:focus { border-color: var(--accent); }
    .session-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 8px;
      font-size: 10px;
      color: var(--text-muted);
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border-color);
      flex-shrink: 0;
    }
    .session-indicator .session-name {
      font-weight: 600;
      color: var(--accent);
      font-family: var(--font-mono);
      font-size: 10px;
    }
    .launch-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      padding: 3px 8px;
    }
    .launch-btn {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 8px;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      background: var(--bg-secondary);
      color: var(--text-secondary);
      font-size: 10px;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
    }
    .launch-btn:hover {
      background: var(--bg-hover);
      border-color: var(--accent);
      color: var(--text-primary);
    }
    .thinking-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      font-size: 10px;
      color: var(--text-muted);
      font-style: italic;
    }
    .thinking-indicator .dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }
    @keyframes dots {
      0% { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
    }
  </style>
</head>
<body>
  <div class="widget-container">
    <div class="connection-bar" id="connectionBar">
      <span class="status-dot disconnected" id="statusDot"></span>
      <span id="connectionText">Connecting...</span>
      <span style="margin-left:auto;font-size:9px;" id="modelBadge"></span>
    </div>

    <!-- Session indicator -->
    <div class="session-indicator">
      <span>📁</span>
      <span class="session-name" id="sessionName">No session</span>
      <span style="margin-left:auto;cursor:pointer;" onclick="hub.send({type:'refresh-skills'})" title="Refresh">🔄</span>
    </div>

    <!-- Widget launch buttons -->
    <div class="launch-buttons">
      <button class="launch-btn" onclick="launchWidget('session-switcher')">📁 Sessions</button>
      <button class="launch-btn" onclick="launchWidget('skills-directory')">📦 Skills</button>
      <button class="launch-btn" onclick="launchWidget('model-switcher')">⚙️ Model</button>
    </div>

    <!-- Messages -->
    <div class="chat-messages" id="chatMessages">
      <div class="chat-message system">
        Ready. Open other widgets with the buttons above.
      </div>
    </div>

    <!-- Thinking indicator -->
    <div class="thinking-indicator" id="thinkingIndicator" style="display:none;">
      <span class="dots">Thinking</span>
    </div>

    <!-- Input -->
    <div class="chat-input-area">
      <textarea id="chatInput"
                placeholder="Talk to your vault..."
                rows="1"
                onkeydown="handleKey(event)"></textarea>
      <button class="btn btn-primary" onclick="sendMessage()" id="sendBtn">Send</button>
    </div>
  </div>

  <script type="module">
    import { connect } from "../shared/ws-client.js";

    window.hub = connect("vault-chat");
    const hub = window.hub;
    let currentSession = null;
    let currentModel = "deepseek-v4-pro";
    let currentThinkingLevel = "high";

    hub.on("connected", () => {
      document.getElementById("statusDot").className = "status-dot connected";
      document.getElementById("connectionText").textContent = "Connected";
    });

    hub.on("disconnected", () => {
      document.getElementById("statusDot").className = "status-dot disconnected";
      document.getElementById("connectionText").textContent = "Reconnecting...";
    });

    hub.on("state-sync", (data) => {
      currentSession = data.currentSession;
      currentModel = data.currentModel;
      currentThinkingLevel = data.currentThinkingLevel;
      updateSessionDisplay();
      updateModelBadge();
    });

    hub.on("session-changed", (data) => {
      currentSession = data.session;
      updateSessionDisplay();
      addSystemMessage(`Switched to: ${data.session.replace(/^--|--$/g,'').split('-').pop()}`);
    });

    hub.on("model-changed", (data) => {
      currentModel = data.model;
      currentThinkingLevel = data.thinkingLevel || currentThinkingLevel;
      updateModelBadge();
      addSystemMessage(`Model: ${data.model} · ${data.thinkingLevel}`);
    });

    hub.on("chat-status", (data) => {
      if (data.status === "received") addSystemMessage(data.message);
    });

    hub.on("skill-copied", (data) => {
      addSystemMessage(`📋 Copied: ${data.skill}`);
    });

    hub.on("mcp-copied", (data) => {
      addSystemMessage(`📋 Copied: ${data.server}`);
    });

    hub.on("widget-opened", (data) => {
      if (data.success) {
        addSystemMessage(`Opened ${data.widget}`);
      } else {
        addSystemMessage(`⚠️ Couldn't open ${data.widget}`);
      }
    });

    function updateSessionDisplay() {
      const el = document.getElementById("sessionName");
      if (currentSession) {
        el.textContent = currentSession.replace(/^--|--$/g, "").split("-").pop() || currentSession;
      } else {
        el.textContent = "No session";
      }
    }

    function updateModelBadge() {
      document.getElementById("modelBadge").textContent = `${currentModel} · ${currentThinkingLevel}`;
    }

    function addMessage(role, text) {
      const c = document.getElementById("chatMessages");
      const d = document.createElement("div");
      d.className = `chat-message ${role}`;
      d.textContent = text;
      c.appendChild(d);
      c.scrollTop = c.scrollHeight;
    }

    function addSystemMessage(text) {
      addMessage("system", text);
    }

    window.sendMessage = () => {
      const input = document.getElementById("chatInput");
      const text = input.value.trim();
      if (!text) return;

      if (text.startsWith("/model ")) {
        hub.send({ type: "switch-model", model: text.split(" ")[1] });
        input.value = "";
        return;
      }

      input.value = "";
      addMessage("user", text);
      document.getElementById("thinkingIndicator").style.display = "flex";
      hub.send({ type: "chat-message", message: text });
      setTimeout(() => {
        document.getElementById("thinkingIndicator").style.display = "none";
      }, 1500);
    };

    window.handleKey = (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        window.sendMessage();
      }
    };

    window.launchWidget = (name) => {
      hub.send({ type: "open-widget", widget: name });
    };
  </script>
</body>
</html>
